<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Vertica Analytics Assistant — Documentation Link</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        .doc-container{max-width:820px;margin:6rem auto;padding:2rem;text-align:center}
        .doc-link{display:inline-block;padding:0.8rem 1.2rem;background:#0b66ff;color:#fff;border-radius:6px;text-decoration:none;font-weight:600}
        .doc-note{color:#666;margin-top:1rem}
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="../index.html" class="logo">← Back</a>
        </div>
    </nav>

    <main class="doc-container">
        <h1>Vertica Analytics Assistant</h1>
        <p class="doc-note">This repository contains a short placeholder. The full documentation is available via the link below.</p>
        <div style="margin-top:1.5rem">
            <a id="doc-link" class="doc-link" href="#" target="_blank" rel="noopener">Open Documentation</a>
        </div>
        <p class="doc-note" style="margin-top:1rem">If the link is not set, update the `documentation` field for this project in <a href="../data/projects.json">data/projects.json</a>.</p>
    </main>

    <footer class="footer">
        <div class="container"><p><a href="../index.html">← Back to Portfolio</a></p></div>
    </footer>

    <script>
    (async function(){
        try{
            const res = await fetch('../data/projects.json');
            const data = await res.json();
            const proj = (data.projects||[]).find(p=>p.id==='vertica-analytics-assistant');
            const link = proj && proj.documentation ? proj.documentation : '#';
            const a = document.getElementById('doc-link');
            a.href = link;
            if(link==='#'){ a.textContent = 'Documentation link not set'; a.removeAttribute('target'); }
        }catch(e){
            console.error(e);
            const a = document.getElementById('doc-link');
            a.textContent = 'Documentation link not available';
            a.href='#'; a.removeAttribute('target');
        }
    })();
    </script>
</body>
</html>
